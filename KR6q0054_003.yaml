body:
  text: 門人住石霜山慈明大師楚圓集參學儀夫參玄大士與義學不同頓開一性之門直出萬機之路入總持之林苑薝蔔為香扇古佛之嘉猷心明是道懷氷霜而潔白真玉無瑕蘊金石而堅貞驪珠有照紹迦葉之正宗傳曹溪之密印自省者不論尊幼玄通者豈礙賢愚是僧俗以同遵乃聖凡而共湊心明則言垂展示智達則語必投機了萬法於一言截衆流於四海如斯則何天不皎何地不平既有觀見之光豈無能鑑之者今時欲參此道便須省己如燈照多生之暗室高明似月輝積劫之昏衢洗意清神亡身為法學師子兒哮吼勿逐野干同鳳凰子翱翔休隨黃雀精進為務覺多生罕遇奇人勇猛為心慶此世得逢知己須開正見切要精通物外高流無生怠慢忠言逆耳不順人情直語無私幸希覺察行腳歌發志辭親意欲何能投佛出家異俗專心慕法為僧既得尸羅具備又能法服霑身父母不供甘旨王侯不侍不臣潔白修持如氷似玉不名不利去垢去塵受人天之瞻敬承釋梵之恭勤忖德業量來處將何報答為門戶專精何行即能消唯有參尋別無路苦身心歷山水白眉作伴為參禮冒雪衝霜不避寒渡水穿雲伏龍鬼鐵錫飛銅瓶滿不問世間長與短叢林道侶要商量四句百非一齊翦探玄機明道眼入室設針須鍛鍊驅邪顯正自應知勿使身心有散亂道難行塵易漫頭頭物物須明見區區役役走東西今古看來忙無限我今行勤自辨莫教失却來時伴舉足動步要分明切忌被他虛使喚入叢林行大道不著世間虛浩浩堅求至理不辭勞剪去繁華休作造百衲衣雲水襖萬事無心離煩惱千般巧妙不施功直出輪回生死道勸同袍求正見莫似愚夫頻改變投嵓立雪猛身心方得法王常照現請益勤恭敬速不避寒暄常不足只緣心地未安然不羡榮華不怕辱直教見性不從他自家解唱還鄉曲度平生實安樂蕩蕩縱橫無依托四方八面應機緣萬象森羅任寬廓報四恩拔三有問答隨機易開口五湖四海乍相逢一擊雷音師子吼悠悠自在樂騰騰大地乾坤無過咎分明報爾水雲僧記取面南看北斗讚曰五湖四海歷叢林萬里千山不易尋親覲祖宗明見性莫將薺苨作人蔘略序四宗頓漸義夫律師者宗分有部細行威儀弘範毗尼嚴淨三界究七聚五篇之奧窮四夷二過之微持犯開遮真常軌則白三翻之羯磨唱四忍之護持若非宣律之能爭得同成師範者也夫法師者登狻猊座廣敷妙義談二空理理契圓常開頓漸之門擇聖凡之慧隨方處藥量器堪任知熟知根甄邪甄正煥然能所明暢主賓因果不昧於人間道化罔迷於天界擊大法鼓豈廢津梁非四依三德之高流寧得弘通於大教除非達士頗測淺深堪作當人始稱導誘者也夫論師者擊鐘樓上立義場中縱奪臨機斥呵當勢聳四無礙之雷辨掩千萬類之鼓音邪正雙驅有無互起奪赤幡于手內鞭白骨於階前高建法幢廣摧異見非若馬鳴龍樹之威豈敢當鋒者矣夫禪師者元真一氣堅固三空行住怡然語默憺靜携金剛之智印傳諸佛之心燈照積劫之昏衢燭多生之暗室截衆流於四海了萬法於一言直指人心見性是佛同師子而哮吼大闡玄音震龍猛之天雷直明妙旨皆是懸通佛記須知宿植勝因若非洞貫天機那得安禪靜慮識心達本冥契諸緣悟性無生頓超事理當得續焰傳燈光輝三界佛日長明者也不出院歌志靜安禪不出院天機洞貫十方同無為大化人難湊有作微權世易通真慧劍絶磨礱當疑破惑濯愚蒙正定不生諸妄解須知萬法本元空塵沙界一念中百千妙理瞥然窮彈指盡收無量義縱橫豈礙往來風坦蕩蕩坐顒顒幽庭深院對青松澄神靜處間心地唯有高僧問至宗病起藥興除妄病病除藥遣道堪崇鶣鵲能針虛用力祁婆妙術枉施功寬性海普吞容饒人量器列疆封謙如育德申仁義敦美溫良順克恭圓自智感殊功人問天上廣興隆淳朴不移山野志樂說無生得聖聰休計度莫思量眉間忽爾放毫光照破無明多劫黑三山鬼賊不能藏戒定慧解脫香知見分明滿十方為報諸賢須守護遙天必定降嘉祥寶光明殿親記說雷音震吼法中王伏龍鬼化剛強如如不動行溫良百福莊嚴資萬乘總持道化樂時康實堪忍樂深藏不話春秋青與黃兀兀如癡心自在騰騰似醉性舒光四句百非俱不著優遊安坐法堂堂頌曰行心已歇身安靜妄斷攀緣世不拘絲髮不移通法界河沙佛國一毫舒自慶歌慶幸慶幸無人哭安禪正坐常知足不貪世利不求餘不羡榮華不怕辱辰一齊寅一粥麁細任從麥與穀破衣壞衲度寒暄普為人天多植福智慧刀戒定燭照破無明黑暗獄直截根源諸佛言叮嚀為說須記録法性通無諂曲問答隨機不拘束慈悲喜捨種良田寬裕清通施金玉性恬和常肅穆願與天人作眼目五根五力導五通三脫三空壞三毒清淨心無雜欲常將慚愧作衣服瓔珞莊嚴解脫身誓與塵勞不相續法界周任延促來往不論僧與俗無生無念總無疑有德有能任斤斸我今自慶自欣愈同道同心常共讀頌曰無德無能無所解無心無意續玄燈無生無滅無來去無是無非一箇僧德學歌今之重學古之重德德學相扶堪為軌則夙夜強學席上珍總似巢由千萬億安睡高枕翠蘿間青靄白雲伴賢德武陵潛舜讓國廬庵蓮社招不得十八多才五老迎披莎側笠千峯北穿耳胡僧却相識同坐同吟同共食携琴執錫碧嵓巔調琴卓錫長泰息五千言美上德積學成功却失德寂然不動更無思感而遂通如晷刻似安師見彌勒正問三科謂玄默物外高談會者希世智辨聰未奇特道中人數相覓瞬目揚眉便端的丘伯當初髣佛間自餘誰更能相擊古云一合乾坤夾是非所以少林長面壁頌曰休經罷論絶文章為效先宗續古皇心地開通明至理全提應用得玄綱真燈一照無明破假幻三因有質亡為報五湖參道者速須親近法中王因見古德玩珠吟乃述玩珠歌蕩蕩神珠身廣大落落圓空無障礙萬象縱橫影現中赤白青黃常自在天然器含法界不著聖凡兼古代靈通照燭體無瑕彼此是非百雜碎有威神無生滅貧苦之徒須擊發賑濟三塗六道中利生引出乾坤月或大或小人不別隱顯人天離圓缺用時便用不思量拾礫之流明皎潔無價寶如意珠隨緣遇物化非虛春興和煦成真相秋分結實滿倉儲心如空意如鏡垢盡空空亦無鏡豁達玲瓏只箇珠愚人不識諸佛性活鱍鱍白洞洞古聖今賢皆掌弄四方八面現靈光但爀巍巍絶輕重善友得濟飢慳直出威音至聖前分明識取箇精真長劫免被衆魔牽本色衲僧高著眼茅刀不過待驢年與重巖道者住山歌住山須識山中主不識徒勞山裏住青山緑水眼前飛白靈散漫山頭去嵓又高嶺又峻曲褶徘徊身自困臨崖石上坐思量正性不明心躁悶望林巒看石壁滿目杉松懸布滴不知何者是真山妄念空多元不息我修行憑何力見性未分無道德將甚酬他施主恩一米七斤難消得願今身逢知識決擇身心去荊棘常持法雨潤心田百福莊嚴俱濟益豁然通心明悟這回識得山中主行住坐臥體輕安問答隨機巧回互身如山性如水山水空花無表裏對境看時似有形子細推窮從誰起既分明心通徹坐臥山中常快活不消功力用求真皎皎青天見明月照山林無不遍一片霞光如白練飛禽走獸任縱橫皆是向渠影中現師子王常獨步百怪千邪離驚怖龍天釋梵總歸依此是妙峯真正主千溪萬總唯心直至涅槃山上路頌曰山中有主山中住山石經行山水語端坐山林山色心心外無山山是生識得山中不死人覺智圓明自看取乾坤大地及江河總是山僧行李處廣智歌一十五家門風大道頗見有高低真空那肯說疏離如海吞流同增減似妙峯聳總擎持萬派千溪俱入海七金五嶽盡須彌玉毫金色傳燈後二三四七普聞知信衣息廣開機諸方老宿任施為識心是木從頭說迷心逐物却生疑或直指或巧施解導前綱出後機旨趣分明明似鏡盲無慧目不能窺明眼士見精微不言勝負惰愚癡物物會同流智水門風逐便演宗枝即心佛非心佛歷世明明無別物即此真心是我心我心猶是權機出已上是馬祖宗派或五位或三路施設隨根巧回互不解當今是本宗展手玄通亡佛祖已上是洞山宗派或君臣或父子量器方圓無彼此士庶公侯一道平愚智賢豪明漸次已上是石霜宗派有時敲有時唱隨根問答談諦當應接何曾矢理儀淺解之流却生謗或雙明或單說只要當鋒利禪悅開權不為鬪聰明舒光祇要辨賢哲有圓相有默論千里持來目視瞬萬般巧妙一圓空爍迦羅眼通的信已上是溈仰宗派或全提或全用萬象森羅實不共青山不礙白雲飛隱顯當臺透金鳳已上是石頭藥山宗派象骨鏡地藏月玄沙崇壽照無缺因公致問指歸源旨趣來人明皎潔已上是地藏至雪峯宗派或稱提或拈掇本色衲僧長擊發句裏明人事最精好手還同楔出楔或擡薦或垂手切要心空易開口不識先人出大悲管燭之徒照街走已上是雲門宗派德山棒臨際喝獨出乾坤解橫抹從頭誰敢亂區分多口阿師不能說臨機縱臨機奪迅速鋒鋩如電掣乾坤祇在掌中持竹木精靈腦劈裂或賓主或料揀大展禪宗辨正眼三玄三要用當機四句百非一齊翦勸同袍莫強會少俊依前成窒礙不知宗脈莫顢頇永劫長沈生死界難逢難遇又難聞猛烈身心快通泰了義經歌修多羅藏諸佛奧旨示生滅門釋無生理直指心源敷第一義截僞續真授人天記意出有無行過籌計言不拘理不制正顯無功亡漸次八萬四千諸度門祇為迷徒多巧僞有邪諦無真智立正摧邪二俱祕大聖無功一切通三毒不生佛出世此箇經信有幾毗盧藏內貫花偈是經常在一塵中大智之人能普濟釋梵護天龍喜惡鬼修羅恭敬禮更有千邪百怪來聞說此經皆䠒跪真實經離文字演波羅蜜普周備化相能開方便門總攝多般都一智眼絶見耳絶聽六用如空不相閉萬象森羅夢裏塵誰人肯向夢中睡素怛囕明有記摩怛哩迦依了義清淨無生解脫根雜念盡為煩惱抵淨尸羅遮俗世毗尼木叉親自製波離不識比丘元無垢始明心地契報君知須審細一種談經明解義河沙曠劫歷微塵不識茲經長日醉解空人祖佛位剖出衆生根本智利他自利化無邊妄斷攀緣成大士勸人天聽了義直出輪回生死際當處無心空不生永棄斷常能所地緣起無因不強名只箇圓音勝一切分明為報道中人勤讀此經長莫廢復云作麼生得不廢去佛道訣佛道顯然顯然不是不是不辨萬象俱現日月空明物我皆氷氷鏡弗真杳絶疏親陽焰空花今古何存虛機釋幻妄自指陳指陳不了全成大兆了指失宗妄認西東達本識空劫盡莫通二乘不曉如石壓草草根不除葉不能枯草石俱掃更有何惱吾宗直截太虛生滅生滅通辨隨機緣轉弗用針錐直須快見快見無差即是余家余家無物衆魔不屈三世如來皆從斯出日用無傷觸目開彰口放毫光永絶稱揚乾坤廣大人王法王如斯不決任自提綱古皇道古皇道坦然坦然常自在智慧與愚癡邪正成窒礙東西南北周不明妄作解心明一切明心昧一切昧六門靜六通三毒成三界總是意根生不須生妄解地水與火風四空為祖代祖代不惺惺子孫虛揑怪八萬四千門結繁都一塊森羅日月分依位不相背漢玉及胡氷九夏水流快切莫妄指陳指陳眼翳殺眼中青不亡空花豈可退古今參學徒與此恰相對不過大中關病根終不差與爾撥大虛解脫觀自在如今一切通洞曉十方界是非歌出家學道總須知在衆叢林切莫虧尊幼古今詮有德勿同愚輩是兼非聞說好心便喜聞說惡恨不死好惡都來只自心剛向其中覓道理世間人多無智不解思量是非起大智之人看著伊自己容身入無地子路曾遭漁父呵夫子慚顏足忘履舍利尊第一記亦被愚夫親正指如來慈眼視衆生了達古今明本際看周秦及漢魏敗國亡家皆總是歷劫是非地獄因聞說是非須審細我聞說心不起只箇是非便親旨些子浮言尚不銷問甚西來祖師意要分明辨根帶曉箇是非真有地更有人來說是非向道余今識得爾魚鼓歌天地之間宇宙之際不逐四時寧同三世為魚則滄波之外作木乃白蓮宮裏頭尾俱全鱗角皆備心寬腹大而長生身直性空而無死虛間自在終不犯於金鉤杳絶名言願長申於玉偈森羅不礙處寶剎以為祥萬象那同在乾坤而作瑞時時扣擊十方之海衆來臻每每傳音五天之胡僧去𥧌香厨最上舒空界之千光不雜人天引太虛之一氣冥心大士聞之則爽朗精神懵懂禪流聽之則堂中瞌睡六律不拘八音何滯四惡之名利已祛五美之間聲不至口珠每吐難逢別寶之人龍角長申罕遇識龍之士潛身金谷患為鐘鼓先規示質精藍且與童真作器江湖之外寧同點額之鱗海嶽隨身自有冲天之勢同袍側耳聽解脫之圓音普眼門開見乾坤之廣細拄杖歌八節九曲山水具足頭腳分明開人眼目不從天不從地橫竪長空無壅滯常將擊發上根人懵懂禪流且瞌睡或登山或渡水用導前岡作肘臂九州四海任升騰卓然直下金輪際實堅貞堪倚仗頭尾回旋指的當解脫文殊疆界分本色衲僧劈脊棒又拄杖歌我有一條曲杖節鬪螺紋山勢樣橫擔天下撥虛空邪魅見之皆膽喪實堅貞硬如鐵擊石山河須爆裂有時攪海伏獰龍騫馱佉羅當時歇辨頑愚明宗的不是文殊虛效力相似之談不要舒屎中展臥幾時出山僧又見不忍卓刺教伊須奮迅振令萬象豁然明咀娑阿竭碎如粉示人天要知分各各英豪添爽俊昔時金色獨擎持今日汾陽親掌印印群心明如日未辨正邪莫啾唧挑摘教君子細看鬣𮌀眼睛阿誰識識得者是何枝休言南北與東西不是飲光親付囑爭得成龍天上飛大丈夫須猛烈徑定聖凡蹤跡絶直言一拂去餘塵拈得拄杖驀頭掣頌曰一條拄杖刺嵑徑直螺紋爆節尋常肩上橫檐大地乾坤挑斡𭤒開懵鈍頑癡打破憐利尖黠如今卓在西河諸方作麼拈掇一字歌諸佛無法可說汾陽略宣一字不干紙墨文章豈效維摩焌地三乘未稱吾宗萬行亦非他意見性唯祇自心認著依前不是塵中世界無涯自在逍遙行李毛頭海嶽無邊曠蕩遊山玩水一字歌百萬偈的的相傳傳子細句句幽微微又玄只箇玄玄玄本智飲光尊同明證瞬目欲恭行正令諸徒異解枉施功亂向途中認凡聖不用求元不失妄念才生黑似漆幻化浮雲性本無方寸迷真捉幻物歷劫迷不曾省遍計河沙妄纏病如今證得本根源靈智廓然離邪正汾陽直說審思量瞥爾緣塵拋佛性八節遷一心秉密密那伽常在定青霄碧落是家風信手拈來善祇應投針入室要商量一字歌中明似鏡讚深沙神大悲濟物福河沙現質人間化白蛇牙爪纖鋒為利劍精神獰惡作深沙鼻高言言丘帶嶽耳大輪𮝜山疊𮃹黤䫡兩睛懸金鏡磔索雙眉鍤鐵叉有螺筋有蚌結皴皴𭽬𭽬身爆烈腳蹈洪波海浪翻手撥天門開日月現威靈如忿怒遙見便令人畏懼瓔珞枯髏頸下纏猛虎毒蛇身上布師子衫象王袴更絞毒龍為抱肚非但人間見者驚一切邪魔無不怖真大聖實慈力現相人間人不識都緣塵劫縱頑嚚不信大悲施軌則或驚天或震地哮吼喊呀聲匝地警覺群生睡眼開敲磕愚迷親佛智我今知能方便利物觀根千萬變或擒或縱或扶持只要速超生死岸驅雷風擊覢電霹靂鋒機如擊箭輷輷磕磕震天威爆爆熚熚須鍛鍊丘區巘崿一齊平劍戟槍刀無不殄化人天伏神鬼磽硬剛強盡瞻禮放光覢爍靜乾坤吐氣停騰清海水吾今讚爾實靈通曠劫如來親受記頌曰威靈不測化人天現質三千滿大千一念遍收無量劫河沙諸佛口親宣屏風歌余有素屏風美施今古蹤端形皆皓色頗得稱禪宮不裝點勿舒功能遮劫壞鼓南風煙塵雲霧俱弗著萬象森羅總現中愚不識智先通積雪為真雪莫同定光曾受能仁記釋迦因此化瞑矇方整體靜圓容只在人天天勿窮士庶公侯為景秀貧賤愚癡隔壁聾可珍仰實難逢百千萬劫失形容如今不識還巧妙爭如掌玩素屏風筋力有勿痕跡不使良工一點力珂月長舒玉練明照爍乾坤用無德師一日携拄杖行次俗人問手裏是什麼師云大不知時云弟子罪過師云不打爾因茲有歌一條楖𣗖手中拄𭣟地撑天無價數頭尾回旋擊電機堪與諸方作規矩報禪流猛提取渡水登山且依怙橫擔世界臥長空指出乾坤明佛祖打愚癡伏猛虎直截根源分付與教伊自在用縱橫量器方圓巧回互罕逢知莫謾語黃檗高亭大莽鹵德山臨際盡鋪舒荷澤分明承六祖後學流少砧杵掌內擎持不能剖韶陽偏得睦州心保壽開堂越今古示同袍指行路肩上挑衣大辛苦瓶鉢都來些子多千千萬萬擔將去如今舉動總隨身不過茅刀自看取山僧歌卓犖風姿寉眉烏髮曾遍歷於山雲亦廣行於海畷普見宗師躬身參謁或則請問投機或即開鋒提掇或即大衆以同途或即獨行而栖息萬年松上高聳一枝千聖林中明懸孤月蹉跎於宇宙之間蹭蹬於湘江避拙是以巖阿凝定身心而自在俱間雄峯宴坐神靜而清虛總歇或策杖而經行或逢人而指訣寶光影裏願作明燈玉軸函中長為擊發軟如綿硬似鐵一片真心常皎潔縱橫不礙往來風運用豈更有時節垣蕩蕩勿拘結粥飯尋常茶又啜寒即烘爐堂裏安熱即青蘿松下歇任王侯從檀越不怕嚴凝地凍裂天晴萬象不能遮雨後撥雲開日月振威神凝霜雪霹靂鋒機如電掣直言不見有纖毫誰更將心誇巧拙有人不會問如何向道還同楔出楔壽山歌壽嶽南臺寶月長開隱一箇圓明大象顯三句炟爀崔嵬爍電之機愚迷罔措或展拓而出沒太虛或收攝而針關難度一淳道者無鑑藥於言詮千學之徒有機關於語路或雷驚於宇宙聖凡路絶或指示於乾坤群靈普入有生有殺無匿無私麗水之真金不重塵途之瓦礫非輕如天普蓋似地普擎孤窮之子歸家錯判之徒共爭歷歷落落撈撈摝摝滿滿兮十方世界蕩蕩兮六道空廓實不思議正宗難墜祖祖相傳佛佛授記阿呵呵莫瞌睡歌頌既彰分明道理頌曰爍電機已早遲碧眼胡莫揚眉大海龍小水龜壽嶽聳日月低虎豹奔波走師子吼全威正宗長不朽邪徒勿強為是非都不管真箇法王兒法身歌蕩蕩全軀人天莫測雖無念以無私乃有恩而有力展之不舒收之不克現千般異像於人天化萬類長懸於太極震威靈無邊剎土豈礙星辰化群生有識界中寧亡軌則不話無功豈談寂默興大悲而拔苦有恩運大慈而與樂無德或擒或縱只在臨機或用或施互為光飾用則遍滿十方施則不移晷刻縱則放曠寬容擒則毗耶杜默實不思議可行可止只目前兮巍巍莫覩在纖塵兮落落何視有作有能無心無意上智聞兮爽神下士見兮眼翳塞之杜源通之流水明白只要心開不管古今道理一念不通有塞瞥爾心開無滯雖然毫髮不收曾與空王同志直言普告人天分明這箇不是復云那箇是玩珠歌晃晃圓珠表裏明長居塵世不彰形觸物用光光不盡應緣照世世無生常皎潔體無瑕隨機引接稱僧家貧苦之人常濟拔賢豪之類助英華不居地不居天毗盧藏裏解方圓有意搜求終不見無心燭物照寧偏衣中寶用無邊斯多曾獻祖師前瓔珞親傳密多手西乾東土化人天如今得不須慳大悲展手施心寬饒益解行方便慧利他自利悉周圓性水歌智水流通流不竭湛然濯世異生滅渡人濟物解方圓潤洽良田衆果結養魚龍清火獄渴乏飢羸皆飽足苦惱俱消水不渾天上人間常滋沃波浪停衆流息千澄源長皎碧萬象齊分總不妨各各靈明俱濟益方丈素壁歌金園素質無瑕隙不使良工一點力表裏從他照國明免將巧手畫為則入此室心不撓雪嶽霜天常皎皎玉鏡蘇燈晝夜輝照出輪回生死道證道頌二十首入聖超凡割愛親勿同愚慢縱貪嗔六根永滅邪思漏便得光明解脫身入聖超凡割愛親便從博地了煩塵速除癡騃無明苦即是圓通自在人入聖超凡割愛親無令容易度秋春斬釘截鐵勤精進上味醍醐最是珍入聖超凡割愛親為求祖印揥心燈六道八解三明徹方得堪為應供人入聖超凡割愛親勿輕小罪撥無因如今見有愚慵者才作高人却下人入聖超凡割愛親滅除妄念絶煩塵心同朗月添群象萬德莊嚴一行真入聖超凡割愛親直須堅猛莫因循無令少樂侵名利失却高賢德行人入聖超凡割愛親便同孤寉不同群雪毛丹頂天然貴清唳翱翔一片雲入聖超凡割愛親勤行精進莫教虧專心供佛挑燈燭獻果焚香志勿疲入聖超凡割愛親志拋家國奉慈尊巾瓶策勵心無倦願事空王作子孫入聖超凡割愛親片雲孤寉喜同鄰氷霜不變金剛性此界他方作大人入聖超凡割愛親丹霄騰霧越星辰依時造化興雲雨灑潤山河翠色新入聖超凡割愛親天然自性比浮雲騰空不礙高低路正氣融和逈出群入聖超凡割愛親移山竭海路通津不辭接引勞心力只恐人中罕遇人入聖超凡割愛親一言道合便同門休將心識虛等覓日月何曾屬暗昏入聖超凡割愛親須知同類不同群慈悲喜捨多饒益不在功能不在文入聖超凡割愛親便將心意合天真回光返照明今古識得愚人是智人入聖超凡割愛親乾坤大地不妨身虛空展縮無增減一種為僧利濟人入聖超凡割愛親無令魔子巨頑嚚從今輕用金剛杵擊碎須彌作粉塵入聖超凡割愛親如龍騰霧布祥雲驅雷降雨滋苗稼萬物咸蘇祝聖君擬寒山詩雨落田中濕風搖樹上寒時人𮠔肆去山翁屋裏眠似醉人難識如癡兩鬢班白顏猱叫處驚出一雙猿好是住汾陽猶連子夏岡西河蓮藕熟南國果馨香野客爭先採公侯待後嘗仲尼不遊地唯我獨消詳紅日上東方霞舒一片光皎然分萬象精潔涌潮岡蝶舞叢花拆鶯啼煙柳茂孰能知此意令我憶南陽余家路不遙金界示金橋香嶺叢花拆煙嵐日上銷清涼千谷靜紫府萬賢高我笑寒山笑豐干腳下勞無德住西河心間野興多太虛寬世界海嶽蹙江波獨坐思知己聲鍾聚毳和欲言言不盡拍手笑呵呵百福莊嚴相從頭那路長雲生空裏盡雨落滿池塘春鳥喃喃語秋鴻役役忙孰能知此意獨我化汾陽方種巧升騰須知一點真古今研至理明暗示餘塵虜塞風霜急長空雨露頻天台山裏客却與我相鄰歷劫何曾忘長年只麼間蓼花芳浦岸松韻響溪間三島雲開靜五峯雨霽山古今常不昧金界碧霄看寂寂虛間處人疏到此來透窗明月靜穿戶日光開鶴聚庭前樹鶯啼宇後臺同心誰得意舉目望天台全體是寒山唯能向此眠捉猿高嶺上放虎石溪邊花拆香風遞松分細雨穿疏林竹徑重將謂是神仙唐六祖後門人立讓大師為七祖頌曰一達磨大師西天二十八東土為第一親承迦葉宗得法波羅蜜六衆已調伏三化早周畢震旦果芬芳遍界金光出二可大師斷肱求法人今古應難比立雪至齊腰屈身禮到地願開甘露門廣度群生類不是小因緣必成於大事三璨大師世人見風狂可公知大器有罪乞師懺師云無罪底言下契真源佛法僧無二備弘智惠門大闡曹溪志四信大師隨化處人問往來俱不止直望雙峯山頂空分一氣童子記牛頭融公受教至法布滿娑婆帝王躬自禮五忍大師初生與世殊量含於太虛室女親為母見僧絶有天宿住人皆讚他心美不如巍巍容相異千聖一真軀六能大師混世人難測權作採樵夫訪道尋知識殷勤捨俗愚親得黃梅旨疏看白玉書負石舂糠志酬恩行不孤七讓大師已得觀音號猶談讓子名有危持夢救無苦不辭輕受讖應先聖傳燈付後經隨根興普澤蒙潤即芽生敘六祖後傳法正宗血脈頌能師密印付觀音百丈親傳馬祖心黃檗大張臨際喝三聖大覺解參尋興化流津通汝海寶應曾窮風穴深首山一脈西河注六七宗師四海欽師子金毛牙爪備嚬呻震奮象穿林群狐併蹤狐蹤絶衆類潛形類不侵唯有五湖真大士遠方來湊競投針橫笻掛錫挑燈手不過茅刀豈得金為報水雲參道者直須英俊勿沈吟一般採藥求真藥莫將薺苨作仁蔘真印真得親傳軌則千萬人中一兩人克又頌鵝王鳥飛去馬頭嶺上住天高蓋不得大家總上路六根圓明頌眼色圓明色是心色心無物更相侵相侵只是心根動動靜圓明觀世音耳聲應響普圓音十方洞徹古兼今今古圓通觀自在迷悟須知一道心鼻香塵剎盡皆通普應圓彰事理融此界他方和合處不論凡聖在其中舌味蓮花相前有甜苦辛酸應不久分明了別是塵心演說談玄不在口身觸圓真萬行全隨機擊發勿邪偏普含法界元真淨只箇圓通理事寬意法舒光一切空總持園苑號吾宗金色頭陀親付囑六相圓明一路通都釋六根圓明短歌眼耳鼻舌身兼意六用皆同一法智百千巧妙應機緣物物俱圓離塵翳眼色空耳聲離香味觸法俱無滯和融自在號圓通這箇圓通絶真僞要分明須審細六道神光常不閉心隨萬境境唯心心境元空總周備重重帝網六門開鏡象圓真明一切六相頌見是阿那律分明無一物大地及山河演出波羅蜜聞是跋難陀聲通總莫過遠近一齊了更不念摩訶香是殑伽女慈悲心偏普淨穢盡能知即此我人母味是憍梵鉢甜苦尋常說入口辨辛酸恰似當天月觸是舜若多善惡總能和塗割無嗔喜只箇是彌陀意是大迦葉毗盧俱一法幽室顯然分枝派千花葉辨邪正垂帶稱提辨是非要分緇素識尊卑針筒鼻孔須拈出若無巴鼻失宗機恐顢頇一向高茅又不通須明春夏及秋冬水動波澄知是濕達幻方能得性空巧辨不真須有志巧口多聰號辨才分明却與道相乖若無斷臂酬恩者爭肯西胡特地來得用全作用威權理要分勿教觸事有情塵看君駐意求玄旨不是楞伽會上人擬將來獨脫將來已早遲隨言薦得更何為直似江西逢馬祖也是汾陽第二機辨作家汾陽寨下有作家箇箇能提鱉鼻蛇將頭作尾能施展本色衲僧薩普吒識機鋒二頌爍電之機不易當將心學道轉顛狂直饒咬得當鋒箭也是烏龜水底藏疾焰過風用更難揚眉瞬目隔千山奔流度刃猶成滯擬擬如何更得全句內明真句裏明人事最精來機深辨審須聽禮拜進前分皂白眼中早有焰光生顯宗用迅速超然物外機莫教駐思有遲疑喻似金剛携寶劍擬將切玉早成泥讚師機䦎閬宗師不易逢電機聳峻疾如風禮拜進前身定動知君失却主人翁因僧毳衲有頌抖擻頭陀服分明百衲衣不從針線出豈肯等閒披萬行方為首千賢一路歸如今承事者必定續能師南行述牧童歌十五首我有牧童兒常樂古書典不將文筆抄祇麼便舒展未曾讀一字要文千萬卷應物不須虧問答能祇遣我有牧童兒執杖驅牛轉不使蹈荒田豈肯教馳踐泉水落巖崖青松長石畔牛飽取陰涼餘事誰能管我有牧童兒騎牛入鬧市不把一文錢買斷乾坤地種也不施工收也無準備當市垛皮鞭蟄戶一齊啓我有牧童兒長年百不作日出向光明天晴入巖谷溪水洗牛頭懶草蔽牛腳從他萬象昏我心長寥廓我有牧童兒尋常一似癡有言人不會無心道自知海嶽指淵峻乾坤廣極低人問承何力空拳掌萬機我有牧童兒身心如鐵石不依諸佛言不取世人則吹笛上高山把鞭牛上槭回首笑呵呵大地無人識我有牧童兒䰉鬟髽髻長眉舒兩卷經手挈一條杖指物作乾坤演說成真相孰能知此意天上人間仰我有牧童兒人天不奈何忽將世界生忽打乾坤破顏貌只齠年性寬心海大却問古皇仙誰人生得我我有牧童兒千般呼喚有行時海嶽隨坐即乾坤守回首枕須彌擡身倚北斗先賢不奈何唯我獨長久我有牧童兒是非不到耳縱橫自在安展縮無拘止有意玩江山無心求榮貴長眠牛背上真箇無餘事我有牧童兒披莎戴箬笠不能風雨侵霧露和衣濕春聽百花榮秋看千株泣牧童祇箇心非是不能入我有牧童兒風姿爽古貌心通廓太虛性直量還奧毛端三界現微塵六趣倒傷嗟洗耳翁却被牽牛笑我有牧童兒不解一切法左手提一鞭右手携一榼不見有同流驅牛入石菴須密遇彌迦方能善對答我有牧童兒不著於三昧大地作繩床青天為寶蓋參羅及萬象日月星辰界鼓腹唱巴歌橫眠長自在我有牧童兒醜陋無人識肩上一皮鞭腰間一管笛往往笑寒山時時歌拾得閭氏問豐干穿山透石壁紙扇團團滿月應機擊發解取清涼能去炎熱得用當時雲消雨歇掌內乾坤一齊通徹色空色空明暗普門彰萬物無形對影光法法化成真是幻幻心不住界通方心如空色是幻空幻分明無改變根塵物物盡光鮮不說聖凡兼貴賤遇正陽和風扇水緑山青花爛漫鶯啼燕語話春分令人總憶能公喚又曰余今說色心萬象不相侵直須言下薦切忌句中尋四相地廣寬容負重輕擎持海嶽不曾傾聖凡無不因茲力春色方臨百卉禎水涌高源性本清澄流壅決順方平沃潤良田通津濟滄波須作海潮聲火性堅剛事莫窮能成萬物助神功發來天地俱灰燼上下東西一聚空風動無形不可彰乾坤大地放毫光鳴條拔樹吹砂石總說東君一道芳三教夫子有真知五常是要規百王不能易千載洽昌時老子有丹訣人間近可師去華能守實此外更無知我佛有真眼照盡世間疑三千大千界一念能總知三教鼎三足無令缺一物推窮因果門究竟不如佛鐘了童才擊朗乾坤溪契迷徒不悟門示聽盲聾興大用達人豈不爽精神飲光曾杵通天信吉利吒王息劍輪隨扣發機皆應召普天無不總霑恩圓通聞思修慧獲圓通果滿三乘路不同用即隨機循業現發生諸趣見真功玉毫曾展三塗界金色分輝萬行中爍迦羅眼千燈照母陀羅手印虛空黑黧猫兒黑黧猫兒作用全牙爪纖長勢力圓毛頭涌出真師子眼放毫光照大千無邊寶藏能守護有心蟲鼠解摧殘分明上樹安身法未曾開口𡖦甥前竹杖一條青竹杖操節無比樣心空裏外通身直圓成相渡水作良明登山堪倚仗終須撥太虛卓在高峯上悟道一悟大乘空萬境自然通圓融三界外包含六趣中失旨終無物得用有神功真箇無心道不是小人宗明道皎潔分明不在勳寶光明殿絶纖塵波澄水動元知濕嶽聳雲開皂白分師子嚬呻千獸伏象王蹴蹈一池渾帝鐘日打那吒手拶破乾坤獨出倫文殊劍我有文殊劍光明晝夜舒曾逼如來走徒使比丘蘇天魔皆稽首梵釋盡嗚呼尋常安膝上今古總橫鋪金剛王劍金剛寶劍我常携大振空堂日月輝梵釋天龍親禮讚威光觸物盡當機行腳僧五湖四海盡曾遊自在縱橫不繫舟今日忽因屏上看人人總持用機籌畫劍二首龍泉寫出鬼神驚倒嶽傾湫宇宙清四海八蠻皆貢國垂衣披袞罷欃槍琅玕永息駐心疑物物當機理不移如人問我因誰力報道能公第一枝秋夜秋天靜僧寂寞夜更長心寥廓諦思仁不識審細何依託不見有纖毫應物隨機作人問是何宗同道鳴金鐸雪滿目似銀山心空世界寬光明凝皎潔何物更能宣因人施無角牛二首人施無角牛應瑞有來由果熟誠難避因圓業已周儀相人皆訝藏角不藏頭孫賓遇方朔始可識張稠有頭無角實堪嗟百劫難逃這作家凡聖不能明得盡現前相貌有些些因人得線妙手何曾掛一條今晨蒙贈可知交三乘五性猶花貫爍電當機是毳袍歲旦二首余今周甲子孰可知生死四大夢中漚一身葉上水浮雲不久停甘蔗豈長美唯有一靈光曠劫何曾墜余今六十一白髮相催出幻質比浮雲空心同祖佛春來不羡花秋去豈嫌物更與三十年瞥然如電拂坐禪閉戶疏慵叟為僧樂坐禪一心無雜念萬行自通玄月印秋江靜燈明草舍鮮幾人能到此到此幾能甄寄德山院主西河水闊難逢信善卷山深易隱賢今日遇僧馳片幅貴圖記得箇中玄慶法筵一周甲子慶為僧萬事無心總不能唯有五湖來請問權開三徑去冤憎滿頭白髮從他白遍地氷霜任自氷今古不移絲髮許逍遙物外樂騰騰雜言歌王觀察余見王觀察台星斗柄拔雄雄宋作圭凜凜漢為轄奇兮崛兮王君烈我今始識真賢哲寬猛相須綿又鐵磊磊落落真英傑鞫鞫鞫磕除妖孽一千年聖遇文明合志順天孰能奪啐啄同時頌三首物外無生體妙機洞傳今古棄亡思分明句內超乾象啐啄何曾不及時頭頭萬象顯靈機句句微亡絶慮思凡聖路殊同啐啄直教點鏑不遺時從前垂手接初機正示繁言免妄思今日捧詩來請益聊伸啐啄報當時示衆春雨與春雲資生萬物新青蒼山點點碧緑草勻勻雨霽長空靜雲收一色真報言修道者何物更堪陳書懷寄跡五湖外萍蓬四海間鳳棲桐樹穩鶴憩古松閒雨潤香樓漬莓苔怪石斑吉祥天獻草方稱老愚頑因讀又玄集因讀又玄集堪嗟錯用心不除三惑苦總被四知侵獻寶虧家寶求金失自金幾多迷路者不解自推尋園頭僧乞頌茂殖園林主寒暄切要知地肥多白朮砂鹵少青芝下種宜春澤收藏怕晚灕却因花木盛憶得草枯時三玄三要頌第一玄照用一時全七星常燦爛萬里絶塵煙第二玄鉤錐利似尖擬擬穿腮過裂面倚雙肩第三玄妙用且方圓隨機明事理萬法體中全第一要根境俱亡絶朕兆山崩海竭灑揚塵蕩盡寒灰始為妙第二要鉤錐察辨呈巧妙縱去奪來掣電機透匣七星光晃耀第三要不用垂鉤不下鉤臨機一曲楚歌聲聞了盡皆悉返照修禪總攝安禪心寂靜不被世魔牽入聖超凡境人間出世間見性離文字見性非言說何干海藏文舉心明了義不在廣云云頓漸俱收識心心是佛不識即魔王魔佛一心作佛真魔即狂法界無差莊嚴法界廣精勤剎剎塵塵見佛身經卷塵中誰解出法王真子可宣陳圓通頓了萬德圓通開佛眼千光福相號金輪莊嚴幻質同真際妙覺無生讚道人直指本心衆生少信自心佛不肯承當多受屈妄想貪嗔煩惱纏都緣為愛無明窟頓覺頓悟心源開寶鉢應供人天離禪悅百味酥陀最上珍萬兩黃金也不說迷悟同源迷疑千卷猶嫌少悟了一言尚太多迦葉親傳心印印不從文字付頭陀漸根三乘三乘了義號真詮接引初心出蓋纏遠劫熏成無漏種要明本性解方圓初心五性五性修行道不同人間天上是真蹤往來豈出輪回苦堪愍垂慈六趣中錯用心近見修持苦節人六時行道志精勤心中妄想邪思覺兜率西方覓世尊明道汾陽道廣勿遮欄蹈著清涼路轉寬拾得寒山誰辨明分明同步是豐干西河師子西河師子九州聞抖擻金毛衆獸賓哮吼一聲天地靜五湖四海奉明君汾陽境子夏峯高峻西河水湛深登山涉水客步步見真心直示佛心百川競注歸滄海萬法多名只一心經有明文余又說大悲菩薩號觀音自書每自勤三業誰能笑七賢然燈迦葉後運智古皇前不止無心地寧居有想天一輪明月靜萬寶光妍宴坐爐藏火經行香續煙古今同道者頻復往來篇自懷自覺年來力已知經行宴坐只慈悲無明頓息休人我妄解蠲除絶有疑朽木既非無象質荷花豈得作琉璃從他日月般時序都放身心一似癡學問從前學問幾能知拾礫泥中辨寶稀唯有隱倫高趣者騰騰兀兀混時機學古古者金聲是正聲今人蹤跡倣先行莫教空笑爭蝸角直下今生要不生齧缺傷俊勇聰明不得失人多既得聰明理合和德似顏回堪入室來車去乘聽謠歌十二時歌雞鳴丑百福莊嚴莫自守開門大施濟饑貧英俊還須師子吼平旦寅顒顒端坐自安神四句百非都不著四明照出道中人日出卯不用思量作計校人來遠近少知音不肯休心任煩惱食時辰鐘鼓分明喚主人隨方應供福人天萬德莊嚴是正因禺中巳更莫多求樂餘事三乘五性夢中塵靈光直出如來智日南午直性分明異今古回光普照勿親疏不信依前受辛苦日昳未平等舒光照天地江海高山總不妨這箇分明智中智晡時申萬別千差識取真一正百邪俱不起十力圓通號世尊日沒酉諸行無常不長久經行坐臥不生心便是余家真道友黃昏戌寂靜安禪功已畢了了通身六道光錯解還同漆中漆人定亥一念不生無障礙道合天機性宛然妙旨玄通觀自在夜半子大智圓通無彼此迷悟還如鏡上塵塵鏡俱亡更何事勸世近見人多說是非不能緘口道相依言他短處君還短長短誰人自得知聖凡邪正自須知莫管他人是與非今古幾能窮妙盡妄隨塵境走如癡爭人競我幾時休不覺春光已變秋葉落雁歸霜漸冷布衣草屨更何求禪師語録舊版在汾州歲久多脫落南方亦少見者今勸衆緣重鏤版以廣流通建中靖國元年正月初五日比丘守中題洪州開禪宗文字陳政印行廬山圓通崇勝禪院住持傳法比丘圓璣校勘
