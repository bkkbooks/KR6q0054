front:
  text: 重刊汾陽和尚語録疏昔風穴和尚謂首山曰不幸臨濟之道至吾將墜于地矣觀此一衆雖敏者多見性者少吾雖望子之久猶恐耽著此經不能放捨風穴高提祖印向千聖頂𩕳上下者一著不妨嶮峻其奈首山言前領旨格外明宗直下承當不存毫髮洎風穴上堂舉世尊以青蓮目顧視大衆而首山宏機捷出拂袖便行如淵之深嶽之聳所謂唱愈高而和愈峻也汾陽禪師出首山之門弄西河師子奮出窟爪牙哮吼一聲群魔屏迹梵僧請法即為敷揚戞玉鏗金超聞離見六人大器具在典章耀古騰今叢林標格家法來從有目正音其可無傳在昔雖已刊行歲久遂成湮沒天台子聰首座靈機夙契宗匠親承慨祖室之長冥惜真風之不振握驪珠擬澄滄海執慧斧欲伐邪林募緣重刊垂惠後學余嘉其志故發緒言希聞見而樂從庶有光于祖道者也時至大三年春吳開元住持清茂書一華一葉直指單傳之妙旨自林際傳入汾陽手中如持一尺之鏡容納萬象森羅量內量外何曾見有虛空之廣雲天之高日月之明毛芥堆突之細之大者也怒雷分開泰華摩竭大魚吸乾四大海水當門師子咬斷一切衲僧命根十智同真塞斷一切衲僧咽喉唇吻此猶是將無作有遊戲三昧邊事不落文字語言已前敲唱雙行底句若非直下兒孫向印板上打出定道局在一隅而大機大用超然如恆河沙數木石首座之功豈浪施也哉時至大辛亥開爐後一日住薦嚴比丘德海拜書胡僧金錫光為法到汾陽六人成大器勸請為敷揚伸出西河爪距抉破古今窠臼義天無滓心鏡無痕圓如明月珠快似金剛劍一斬一切斬一斷一切斷上無攀仰下絶己躬常光現前壁立萬仞木石首座重行刊鏤廣其流通療狂子之多疑救達人之少悟龍山起豫謹題謂汾陽實有此録臨濟一宗掃土而盡謂汾陽實無此録臨濟一宗掃土而盡且作麼生入得汾陽門見得汾陽人直下平坦去也至大辛亥之春天台比丘子聰募金重刊中竺遠孫炷香再閲汾陽為聰公排闥而起濟北之道遂昌奮返嚬呻驚勝是為西河獅子遺言行世觀者不翅如飲鳩中者必死舊板磨滅世方幸其毒息木石聰首座復刊而新之流毒滋甚慨今而後曾不知其飲而致於中中而致於必死者幾何人矣住禾城本覺比丘如芝拜書汾陽無德禪師語録序銀青光祿大夫行祕書監知汝州軍州兼管內營田隄堰橋道勸農使上柱國南陽郡開國侯食邑一千九百戶楊億述昔者白象降生教興於權實青蓮視瞬義著於師承厥後隻履西歸一花東布世系聯續開悟寖廣然而根器各異宗致迭舉少林之嗣既分皮髓之淺深大寂之徒亦著心眉之階級雖攪為一呼匪酥酪醍醐之殊然列彼三車推羊鹿大牛之別趨覺城而固有淹速非智眼而孰克照明汾州大中寺太子禪院長老釋善昭者本太原人積習聞薰孤貞絶俗自去飾受具即杖策巡方所至少留隨機叩發歷參知識七十一員最後受印於汝州南院省念遂法裔念出風穴沼沼嗣先南院顒顒嗣興化獎獎嗣臨際玄玄嗣黃檗運運嗣百丈海海出馬祖祖出南嶽讓讓為曹溪嫡子自曹溪至師凡十一世師既投針臨汝分燈摩竭衣珠內炳潮音尚祕薄言湘楚依止林樾道俗歸慕名聲普聞長沙守張侯茂宗以四大寺命師擇居北抵襄止白馬山郡牧劉公昌言躬詣頂謁延住蘭若前後八請皆不之諾淳化四年西河緇素千餘人協心削牘遣沙門契聰詣白馬山迎至其郡遂爾留憩攝伽梨而登席揮犀柄以談空毗耶淨名宴坐罔離於空室廬峯慧遠送迎不越於虎溪淨衆駢臻法韻雄震而師願力勇猛學解淹博周遊湖嶺探索筌蹄效遍參於善財同多聞於慶喜若乃江西即心之誨而歸於無物石頭全提之句而謂之真吼南泉捭闔而自得引發上機趙州縱奪而有端摧伏異見洞山之建立五位回互以彰仰山之分列諸勢遊戲無礙雪峯應接之眼啐啄同時雲門揚攉之言藥石苦口咸達其要悉舉其綱至如大用現前纖塵不立諸法皆泯四句逈超蓋有黃檗之迅機臨際之妙脈三玄三要在掌握之所施二主二賓與盲瞑而何異是為正路直造上乘師之所證踰於格量非齊肩於佛慧曷染指於禪味哉豫刳心彌久感疾無損靜慮冥默世緣紛染守郡楚北恪居官次而師遐遣清侶躬裁尺訊謂廣內集録載師之辭句既參於刊綴汝海答問陪師之法屬且聯其宗派邈同風於千里遽授書之一編法興智深二上人飛錫實勤巽床甚謹述邑子之意願永南宗之旨屬圖鏤版邈求冠篇賞音相從重胝忘苦幸煩襟之微釋因濡翰以塞請云爾
